<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - DentalDetection</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #f0fdfa;
            --primary-dark: #0f766e;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }
        body { margin: 0; font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; background: var(--bg); color: var(--text-main); }
        .register-left { flex: 1; padding: 40px 8%; display: flex; flex-direction: column; background: white; overflow-y: auto; }
        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .logo-box { width: 36px; height: 36px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.1rem; }
        .logo-text { font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; color: var(--text-main); }

        .form-header h1 { font-size: 1.8rem; margin-bottom: 4px; color: var(--text-main); font-weight: 700; letter-spacing: -0.02em; }
        .form-header p { color: var(--text-muted); margin-bottom: 24px; font-size: 0.85rem; }
        
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
        .input-wrapper { position: relative; }
        .input-wrapper input { width: 100%; padding: 12px 14px 12px 42px; border: 1px solid var(--border-color); border-radius: 10px; background: #f8fafc; font-size: 0.9rem; box-sizing: border-box; font-family: inherit; transition: all 0.2s; outline: none; }
        .input-wrapper input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.08); }
        .input-wrapper .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.5; font-size: 0.95rem; }

        .btn-register { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15); transition: all 0.2s; }
        .btn-register:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(13, 148, 136, 0.25); }

        .register-right { flex: 1.2; background: linear-gradient(135deg, #ccfbf1 0%, #0d9488 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; color: white; text-align: center; padding: 40px; }
        .mascot-card { background: white; padding: 16px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); display: inline-block; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.25); }
        .mascot-card img { width: 260px; height: 260px; object-fit: cover; border-radius: 12px; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.02)); }
        .right-text h2 { font-size: 1.8rem; margin-bottom: 8px; color: #115e59; font-weight: 700; letter-spacing: -0.02em; }
        .right-text p { max-width: 400px; opacity: 0.9; line-height: 1.5; color: #115e59; font-size: 0.95rem; }
        .error-msg { background: #fef2f2; color: #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 0.8rem; text-align: center; border: 1px solid #fee2e2; font-weight: 600; }
    </style>
</head>
<body>
    <div class="register-left">
        <div class="logo-area">
            <div class="logo-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C9.5 2 7 3.5 6 5.5c-.5.9-.5 2-.5 3 0 2.5 1.5 5 2.5 6 1 1 1.5 3 1.5 4.5A2.5 2.5 0 0 0 12 21.5a2.5 2.5 0 0 0 2.5-2.5c0-1.5.5-3.5 1.5-4.5 1-1 2.5-3.5 2.5-6 0-1 0-2.1-.5-3-1-2-3.5-3.5-6-3.5z"/></svg>
            </div>
            <div class="logo-text">DentalPilot</div>
        </div>
        <div class="form-header">
            <h1>Create your account</h1>
            <p>Free forever — no credit card required ✨</p>
        </div>
 
        {% if msg %}
        <div class="error-msg">⚠️ {{ msg }}</div>
        {% endif %}
 
        <form action="/validate" method="post" autocomplete="off">
            <div class="input-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <span class="icon">👤</span>
                    <input type="text" name="uname" placeholder="john_doe" autocomplete="off" required>
                </div>
            </div>
 
            <div class="input-group">
                <label>Email Address <span style="font-weight: 400; text-transform: none; color: var(--text-muted);">(Optional)</span></label>
                <div class="input-wrapper">
                    <span class="icon">📧</span>
                    <input type="email" name="uemail" placeholder="you@example.com" autocomplete="off">
                </div>
            </div>
 
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" name="upass" placeholder="Enter password" autocomplete="new-password" required>
                </div>
            </div>
 
            <div class="input-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <span class="icon">🛡️</span>
                    <input type="password" name="upass_confirm" placeholder="Repeat password" autocomplete="new-password" required>
                </div>
            </div>
 
            <button type="submit" class="btn-register">
                Create Account <span>→</span>
            </button>
        </form>
 
        <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 24px;">
            Already have an account? <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: none;">Login here</a>
        </p>
    </div>
 
    <div class="register-right">
        <div class="mascot-card">
            <img src="{{ url_for('static', filename='media/chibi_doctor.png') }}" alt="Chibi Doctor">
        </div>
        <div class="right-text">
            <h2>Your dental care, elevated.</h2>
            <p>AI-powered dental tracking & personalised treatment recommendations — built just for you.</p>
        </div>
    </div>
</body>
</html>
